name: furcolor-demo
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.demo
    container_name: furcolor-demo-web
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    ports:
      - "127.0.0.1:8899:8899"
    mem_limit: 256m
    cpus: 0.50
