name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-tests:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install base test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Parse PowerShell scripts
        shell: powershell
        run: |
          foreach ($file in @('install_local.ps1','install_fursee.ps1','doctor.ps1','run_local.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file),[ref]$tokens,[ref]$errors) | Out-Null
            if ($errors.Count) { $errors | Format-List; exit 1 }
          }
      - name: Run unit tests
        run: python -m pytest -q
      - name: Audit publication candidates
        run: python scripts/security_audit.py